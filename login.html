<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header>
        <div class="logo">
            <img src="logotipo.jpg" alt="logotipo da marca ecobuild">
        </div>

        <div class="search-bar">
            <input type="text" name="search" id="search" placeholder="Buscar..." autocomplete="off">
        </div>

        <nav class="menu">
            <ul>
                <li>
                    <a href="#">catálogo</a>
                </li>
                <li>
                    <a href="#">impacto ambiental</a>
                </li>
                <li>
                    <a href="#">chat</a>
                </li>
            </ul>
        </nav>
        
        <div class="right-side">
            <!-- <input type="button" class="announce" value="anunciar"> -->
            <button class="announce"><i class="bi bi-megaphone-fill"></i>anunciar</button>
            <button class="account-btn"><i class="bi bi-person"></i></button>
        </div>
    </header>
    <div class="wrapper">
        <form action="">
            <h1>Acesse sua conta</h1>
            <div class="input-box">
                <input type="text" placeholder="Digite seu e-mail" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Digite a sua senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox">Lembrar-me</label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn">Continuar</button>

            <div class="register-link">
                <p>Não tem uma conta? <a href="">Cadastre-se</a></p>
            </div>
        </form>

    </div>
</body>
</html>
